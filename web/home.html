<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天 · Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50">
    <div class="flex h-screen overflow-hidden">
        <!-- 左侧边栏 (好友列表) -->
        <div class="w-80 bg-white border-r border-gray-200 flex flex-col">
            <!-- 用户信息 -->
            <div class="p-4 border-b border-gray-100 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-r from-blue-400 to-blue-600 flex items-center justify-center text-white font-bold" id="avatarInitial">A</div>
                    <div>
                        <h2 class="font-semibold text-gray-800" id="currentUsername">加载中...</h2>
                        <p class="text-xs text-green-500" id="onlineStatus">● 在线</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <a href="profile.html" class="p-2 hover:bg-gray-100 rounded-lg transition">
                        <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    </a>
                    <a href="settings.html" class="p-2 hover:bg-gray-100 rounded-lg transition">
                        <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    </a>
                    <!-- 登出按钮 -->
                    <button id="logoutBtn" class="p-2 hover:bg-gray-100 rounded-lg transition text-gray-600" title="退出登录">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    </button>
                </div>
            </div>

            <!-- 搜索用户面板 -->
            <div class="p-3 border-b border-gray-200">
                <div class="flex gap-2">
                    <input type="text" id="searchInput" placeholder="搜索用户..." class="flex-1 px-3 py-2 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500/50 transition">
                    <button id="searchBtn" class="px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-xl text-sm transition">搜索</button>
                </div>
                <!-- 搜索结果下拉 -->
                <div id="searchResults" class="mt-2 hidden bg-white border border-gray-200 rounded-lg shadow-lg max-h-48 overflow-y-auto"></div>
            </div>

            <!-- 好友请求 -->
            <div class="px-4 py-2 border-b border-gray-200 flex items-center justify-between cursor-pointer hover:bg-gray-100" id="friendRequestEntry">
                <div class="flex items-center gap-2">
                    <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
                    <span class="text-sm font-medium">好友请求</span>
                </div>
                <span id="requestBadge" class="bg-red-500 text-white text-xs rounded-full px-2 py-0.5 hidden">0</span>
            </div>

            <!-- 请求列表模态框（初始隐藏） -->
            <div id="requestModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
                <div class="bg-white rounded-lg w-96 max-w-full p-4 max-h-[80vh] overflow-y-auto">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-semibold">好友申请</h3>
                        <button id="closeRequestModal" class="text-gray-500 hover:text-gray-700">&times;</button>
                    </div>
                    <div id="requestList" class="space-y-3">
                        <!-- 动态加载 -->
                    </div>
                    <div class="text-center text-gray-400 text-sm mt-4 hidden" id="noRequests">暂无好友申请</div>
                </div>
            </div>

            <!-- 好友列表标题 -->
            <div class="p-3 font-medium text-gray-700 border-b border-gray-200 flex justify-between">
                <span>好友列表</span>
                <span id="friendCount" class="text-xs text-gray-500">0</span>
            </div>

            <!-- 好友列表容器（动态填充） -->
            <div class="flex-1 overflow-y-auto" id="friendListContainer"></div>
        </div>

        <!-- 右侧聊天区 -->
        <div class="flex-1 flex flex-col bg-white">
            <!-- 聊天头部 -->
            <div class="p-4 border-b border-gray-200 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-r from-green-400 to-green-600" id="chatAvatar">?</div>
                    <div>
                        <h2 class="font-semibold text-gray-800" id="chatWith">选择好友开始聊天</h2>
                        <p class="text-xs text-gray-500" id="chatStatus"></p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button class="p-2 hover:bg-gray-100 rounded-lg transition">
                        <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                    </button>
                    <button class="p-2 hover:bg-gray-100 rounded-lg transition">
                        <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"/></svg>
                    </button>
                </div>
            </div>

            <!-- 消息列表 -->
            <div class="flex-1 overflow-y-auto p-4 space-y-4" id="messageContainer">
                <!-- 消息将动态插入 -->
            </div>

            <!-- 输入区域 -->
            <div class="p-4 border-t border-gray-200">
                <div class="flex gap-2">
                    <input type="text" id="messageInput" placeholder="输入消息..." class="flex-1 px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500/50 transition outline-none" disabled>
                    <button id="sendBtn" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-3 rounded-xl transition disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2" disabled>
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                        发送
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast 提示容器 -->
    <div id="toast" class="fixed top-5 right-5 z-50"></div>

    <script src="js/home.js"></script>
</body>
</html>
